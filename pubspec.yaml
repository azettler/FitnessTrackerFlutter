name: fitness_tracker_flutter
description: "A personal fitness tracker — Flutter rewrite of FitnessTracker."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.0
  go_router: ^14.8.1
  share_plus: ^10.1.4
  image_picker: ^1.1.2
  file_picker: ^8.3.7
  intl: ^0.20.2
  table_calendar: ^3.1.2
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
